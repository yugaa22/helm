name: Secret Scanner

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:

  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          
  secret_scanner:
    name: Secret Scanner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Fail if secrets found
        if: steps.gitleaks.outputs.exitcode != 0
        run: |
          echo "❌ Secrets were detected. Push is blocked."
          exit 1
